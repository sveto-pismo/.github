name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE by @$AUTHOR (#$NUMBER)"
no-changes-template: "- No changes"

categories:
  - title: "📚 Documentation"
    labels:
      - "area/documentation"
  - title: "🚀 New Features"
    labels:
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
  - title: "🧰 Maintenance"
    labels:
      - "maintenance"
  - title: "🚨 Security Updates"
    labels:
      - "security"
  - title: "🔄 Dependency Updates"
    labels:
      - "dependencies/github-actions"
      - "dependencies/containers"
      - "dependencies/dotnet-sdk"
      - "dependencies/nuget"
  - title: "🧑🏼‍💻 Development Tooling"
    labels:
      - "area/dev-tooling"

version-resolver:
  major:
    labels:
      - "increment/major"
  minor:
    labels:
      - "increment/minor"
  patch:
    labels:
      - "increment/patch"
  default: patch
template: |
  $CHANGES

  ## 👨🏼‍💻 Contributors

  $CONTRIBUTORS
autolabeler:
  - label: "area/dev-tooling"
    files:
      # GitHub Actions
      - ".github/**/*"

      # IDE
      - ".editorconfig"
      - ".globalconfig"

      # git
      - ".gitignore"

      # .NET
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "global.json"
      - "nuget.config"

      # Bun & Node
      - "package.json"
      - "bun.lock"
  - label: "area/documentation"
    files:
      - "docs/**/*"
  - label: "maintenance"
    files:
      - "test/**/*"

